name: Build Android APKs

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build ParentApp APK
      run: gradle :ParentApp:assembleDebug

    - name: Build ChildApp APK
      run: gradle :ChildApp:assembleDebug

    - name: Upload ParentApp APK
      uses: actions/upload-artifact@v4
      with:
        name: ParentApp-APK
        path: ParentApp/build/outputs/apk/**/*.apk

    - name: Upload ChildApp APK
      uses: actions/upload-artifact@v4
      with:
        name: ChildApp-APK
        path: ChildApp/build/outputs/apk/**/*.apk
